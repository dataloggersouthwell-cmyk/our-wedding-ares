<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Our Wedding — Point Your Camera at the Invitation</title>

<!-- A-Frame + MindAR (both free, open source, loaded from CDN) -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  :root {
    --ink: #2b241d;
    --parchment: #f6efe2;
    --gold: #b58b46;
    --sage: #6b7a5e;
    --blush: #d9a79c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Georgia', 'Times New Roman', serif;
    background: var(--ink);
    color: var(--parchment);
    overflow: hidden;
  }

  #landing {
    position: fixed;
    inset: 0;
    z-index: 20;
    background: radial-gradient(circle at 50% 20%, #3a3128, var(--ink));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
  }

  #landing h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(28px, 8vw, 44px);
    font-weight: 400;
    letter-spacing: 1px;
    margin: 0 0 8px;
    color: var(--gold);
  }

  #landing .names {
    font-size: clamp(16px, 4vw, 20px);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--blush);
    margin-bottom: 28px;
  }

  #landing p {
    max-width: 340px;
    line-height: 1.6;
    color: #d8cdb8;
    margin-bottom: 32px;
  }

  #startBtn {
    background: var(--gold);
    color: var(--ink);
    border: none;
    padding: 14px 32px;
    font-size: 16px;
    letter-spacing: 1px;
    border-radius: 999px;
    font-family: inherit;
    cursor: pointer;
  }

  #hint {
    margin-top: 18px;
    font-size: 12px;
    color: #9a8f79;
    letter-spacing: 1px;
  }

  #scanOverlay {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    background: rgba(43,36,29,0.85);
    color: var(--parchment);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 0.5px;
    display: none;
  }

  #infoPanel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 15;
    background: var(--parchment);
    color: var(--ink);
    padding: 24px 24px 32px;
    border-radius: 24px 24px 0 0;
    transform: translateY(110%);
    transition: transform 0.35s ease;
    box-shadow: 0 -10px 30px rgba(0,0,0,0.4);
  }

  #infoPanel.open { transform: translateY(0); }

  #infoPanel h2 {
    margin: 0 0 8px;
    font-family: 'Playfair Display', Georgia, serif;
    color: var(--sage);
  }

  #infoPanel p {
    margin: 0;
    line-height: 1.6;
    font-size: 15px;
  }

  #infoPanel .close {
    position: absolute;
    top: 12px;
    right: 16px;
    background: none;
    border: none;
    font-size: 20px;
    color: #999;
  }

  #errorBox {
    position: fixed;
    top: 24px;
    left: 16px;
    right: 16px;
    z-index: 30;
    background: #7a2e2e;
    color: #fff;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    display: none;
  }

  a-scene { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 1; }
</style>
</head>
<body>

<div id="errorBox"></div>

<div id="landing">
  <div class="names">Amara &amp; Julian</div>
  <h1>Bring Our Invitation to Life</h1>
  <p>Point your phone's camera at your printed invitation to see it come alive. Tap on what appears to reveal more.</p>
  <button id="startBtn">Open Camera</button>
  <div id="hint">Works best in good lighting, held ~20–30cm away</div>
</div>

<div id="scanOverlay">Point camera at the invitation card</div>

<div id="infoPanel">
  <button class="close" onclick="closePanel()">✕</button>
  <h2 id="infoTitle">Title</h2>
  <p id="infoBody">Body</p>
</div>

<!--
  MindAR scene. imageTargetSrc points to a .mind file — a compiled tracking
  profile generated from YOUR invitation image (instructions in README.md).
  Currently using MindAR's example test target so you can verify the camera
  works before compiling your own.
-->
<a-scene
  id="scene"
  mindar-image="imageTargetSrc: assets/targets/invitation.mind; autoStart: false; uiScanning: no; uiLoading: no;"
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>
  <a-assets>
    <a-mixin id="pulse" animation="property: scale; to: 1.15 1.15 1.15; dir: alternate; loop: true; dur: 900; easing: easeInOutSine"></a-mixin>
  </a-assets>

  <a-camera position="0 0 0" look-controls-enabled="false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 0.1; far: 10; objects: .tappable"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <a-entity
      class="tappable"
      geometry="primitive: plane; width: 0.5; height: 0.18"
      material="color: #b58b46; opacity: 0.92; shader: flat"
      position="0 0.35 0"
      text="value: Our Story; align: center; color: #2b241d; width: 1.4; font: exo2bold"
      animation__float="property: position; to: 0 0.42 0; dir: alternate; loop: true; dur: 1400; easing: easeInOutSine"
      data-title="Our Story"
      data-body="We met on a rainy Tuesday in a bookstore that neither of us actually meant to walk into. Five years, two dogs, and one very persistent proposal later — here we are."
    ></a-entity>

    <a-entity
      class="tappable"
      geometry="primitive: circle; radius: 0.09"
      material="color: #6b7a5e; shader: flat"
      position="-0.3 0.05 0.01"
      animation__pulse="property: scale; to: 1.15 1.15 1.15; dir: alternate; loop: true; dur: 1000; easing: easeInOutSine"
      data-title="Ceremony"
      data-body="Saturday, October 17th at 4:00 PM. Willowbrook Gardens, 128 Meadow Lane. Doors open at 3:30 — arrive early to grab a seat under the big oak."
    ></a-entity>

    <a-entity
      class="tappable"
      geometry="primitive: circle; radius: 0.09"
      material="color: #d9a79c; shader: flat"
      position="0.3 0.05 0.01"
      animation__pulse="property: scale; to: 1.15 1.15 1.15; dir: alternate; loop: true; dur: 1000; easing: easeInOutSine; delay: 300"
      data-title="Reception & RSVP"
      data-body="Dinner and dancing follow at The Barn at Willowbrook from 6 PM. Please RSVP by September 1st at ourwedding.com/rsvp — we can't wait to celebrate with you."
    ></a-entity>

  </a-entity>
</a-scene>

<script>
  const scene = document.querySelector('#scene');
  const landing = document.getElementById('landing');
  const scanOverlay = document.getElementById('scanOverlay');
  const infoPanel = document.getElementById('infoPanel');
  const infoTitle = document.getElementById('infoTitle');
  const infoBody = document.getElementById('infoBody');
  const errorBox = document.getElementById('errorBox');

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
  }

  function startAR() {
    if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
      showError('This page must be loaded over HTTPS for the camera to work.');
      return;
    }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showError('This browser does not support camera access.');
      return;
    }
    if (typeof AFRAME === 'undefined') {
      showError('A-Frame failed to load (check your internet connection or ad blocker).');
      return;
    }

    landing.style.display = 'none';
    scanOverlay.style.display = 'block';

    const start = () => {
      try {
        const system = scene.systems['mindar-image'];
        if (!system) {
          showError('AR system did not initialize. Try reloading the page.');
          return;
        }
        system.start(); // this is what requests camera permission
      } catch (err) {
        showError('AR failed to start: ' + err.message);
      }
    };

    if (scene.hasLoaded) {
      start();
    } else {
      scene.addEventListener('loaded', start, { once: true });
    }
  }

  document.getElementById('startBtn').addEventListener('click', startAR);

  window.addEventListener('unhandledrejection', (e) => {
    const reason = e.reason && e.reason.message ? e.reason.message : e.reason;
    showError('AR error: ' + reason + '. This usually means assets/targets/invitation.mind failed to load — check the file exists at that exact path in your repo.');
  });

  scene.addEventListener('targetFound', () => { scanOverlay.style.display = 'none'; });
  scene.addEventListener('targetLost', () => { scanOverlay.style.display = 'block'; });

  document.querySelectorAll('.tappable').forEach(el => {
    el.addEventListener('click', () => {
      infoTitle.textContent = el.dataset.title;
      infoBody.textContent = el.dataset.body;
      infoPanel.classList.add('open');
    });
  });

  function closePanel() {
    infoPanel.classList.remove('open');
  }
</script>

</body>
</html>
